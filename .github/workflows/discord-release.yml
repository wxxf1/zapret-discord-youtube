name: Discord Release Notification

on:
  release:
    types: [published]

jobs:
  notify-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Send beautiful notification to Discord
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            {
              "username": "Zapret Updates",
              "avatar_url": "https://avatars.githubusercontent.com/u/109070025?v=4",
              "embeds": [{
                "title": "🎉 Новый релиз: {{ release.tag_name }}",
                "url": "{{ release.html_url }}",
                "description": "{{ release.body }}",
                "color": 0x00ff88,
                "author": {
                  "name": "Flowseal",
                  "url": "https://github.com/Flowseal",
                  "icon_url": "https://avatars.githubusercontent.com/u/109070025?v=4"
                },
                "footer": {
                  "text": "zapret-discord-youtube"
                },
                "timestamp": "{{ release.published_at }}"
              }]
            }
